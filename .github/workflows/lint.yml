name: Test renovate.json configuration
on:
  - pull_request

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Installation
        run: bun install --frozen-lockfile

      - name: Test
        run: bun run validate:renovate
